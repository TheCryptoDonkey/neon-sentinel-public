  <title>Neon Sentinel</title>

</head>
<body>
  <img src="/backgrounds/generated/neon-sentinel-nasa-frontier.webp" alt="" aria-hidden="true" decoding="async" fetchpriority="high" style="position:fixed;left:0;top:0;width:1px;height:1px;opacity:0;pointer-events:none;" />
  <img src="/brand/neon-sentinel-key-art-v2.webp" alt="" aria-hidden="true" decoding="async" fetchpriority="high" style="position:fixed;left:0;top:0;width:1px;height:1px;opacity:0;pointer-events:none;" />
  <canvas id="game" width="1280" height="720" aria-label="Neon Sentinel game"></canvas>
  <canvas id="game3d" width="1280" height="720" aria-hidden="true"></canvas>
  <div id="settings">
    <button id="settings-toggle" type="button" aria-label="Display settings" aria-expanded="false">⚙</button>
    <div id="settings-panel" data-open="false">
      <div class="settings-row">
        <span>VISUAL</span>
        <div id="tier-controls" class="segmented"></div>
      </div>
      <div class="settings-row">
        <span>MODE</span>
        <div id="theme-controls" class="segmented"></div>
      </div>
      <div class="settings-row brightness-row">
        <span>BRIGHT</span>
        <div id="brightness-controls" class="brightness-controls"></div>
      </div>
      <div class="settings-row">
        <span>SCREEN</span>
        <div id="screen-controls" class="segmented"></div>
      </div>
      <div class="settings-row">
        <span>ACCESS</span>
        <div id="access-controls" class="segmented"></div>
      </div>
      <div class="settings-row relays-row">
        <span>RELAYS</span>
        <div id="relay-controls" class="relay-list"></div>
      </div>
      <div class="settings-row tuning-row">
        <span>FEEL</span>
        <div id="tune-controls" class="tune-list"></div>
      </div>
      <div class="settings-row audio-row">
        <span>AUDIO</span>
        <div id="audio-controls" class="audio-controls"></div>
      </div>
      <div class="settings-row music-row">
        <span>MUSIC</span>
        <div id="music-player" class="music-player"></div>
      </div>
      <div class="settings-row legal-row">
        <span>INFO</span>
        <div class="settings-links">
          <a id="support-link" href="/support.html" rel="noopener">SUPPORT</a>
          <a id="privacy-link" href="/privacy.html" rel="noopener">PRIVACY</a>
        </div>
      </div>
      <div id="mesh-status"></div>
    </div>
  </div>
  <div id="touch-controls" aria-hidden="true">
    <div id="touch-stick"><div id="touch-knob"></div></div>
    <button id="touch-fire" type="button" aria-label="Fire">◆</button>
    <button id="touch-burst" type="button" aria-label="Zap burst">₿</button>
  </div>
  <div id="v4v" role="dialog" aria-modal="true" aria-label="Value for value" hidden>
    <div class="v4v-panel">
      <div id="v4v-ask">
        <div class="v4v-kicker">VALUE FOR VALUE</div>
        <h2 class="v4v-title">KEEP THE RELAY LIT</h2>
        <p id="v4v-nudge" class="v4v-nudge"></p>
        <img id="v4v-qr" class="v4v-qr" alt="Lightning QR" width="228" height="228" />
        <div id="v4v-reward" class="v4v-reward"></div>
        <button id="v4v-addr" type="button" class="v4v-addr"></button>
        <div class="v4v-links">
          <a id="v4v-geyser" target="_blank" rel="noopener">GEYSER</a>
          <a id="v4v-kofi" target="_blank" rel="noopener">KO-FI</a>
        </div>
        <button id="v4v-paid" type="button" class="v4v-primary">I PAID</button>
        <button id="v4v-later" type="button" class="v4v-ghost">NEXT TIME</button>
      </div>
      <div id="v4v-thanks" hidden>
        <div class="v4v-kicker">FROM THECRYPTODONKEY</div>
        <img src="/memes/donkey-thankz-small.png" class="v4v-thanks-img" alt="THANKZ" />
        <div class="v4v-thanks-line">THANK YOU · SATS APPRECIATED</div>
        <div id="v4v-thanks-reward" class="v4v-reward"></div>
        <button id="v4v-start" type="button" class="v4v-primary">LAUNCH</button>
      </div>
    </div>
  </div>
  <div id="score-actions" aria-live="polite" hidden>
    <button id="score-publish" type="button">SIGN SCORE</button>
    <div id="value-action-group" aria-label="Value for value support" hidden>
      <a id="value-support" class="value-link" href="#" rel="noopener" hidden>PAY SATS</a>
      <a id="geyser-support" class="value-link" href="#" rel="noopener" target="_blank" hidden>GEYSER</a>
      <a id="kofi-support" class="value-link" href="#" rel="noopener" target="_blank" hidden>KO-FI</a>
    </div>
    <span id="score-action-status">LOCAL SCORE · NO PAYOUT</span>
  </div>
  <script src="/signet/signet-login.iife.js" defer></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
